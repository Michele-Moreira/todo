name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm' # Mude para 'npm' se não usar pnpm
      - name: Install dependencies
        run: pnpm install # Mude para 'npm install' se necessário
      - name: Build
        run: pnpm run build # Mude para 'npm run build' se necessário
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # O Vite joga os arquivos prontos aqui
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
